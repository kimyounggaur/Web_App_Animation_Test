<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">SVG 애니메이션 종류와 실제 적용사례 요약</title>
  <desc id="desc">SVG 애니메이션을 CSS, SMIL, JavaScript, Lottie 방식으로 나누고 UI 적용 사례를 정리한 인포그래픽</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#0c1a2d"/></linearGradient>
    <linearGradient id="a" x1="0" x2="1"><stop offset="0" stop-color="#75e6ff"/><stop offset="1" stop-color="#9af28b"/></linearGradient>
    <linearGradient id="b" x1="0" x2="1"><stop offset="0" stop-color="#ffcf70"/><stop offset="1" stop-color="#ff7e8a"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity=".32"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style><![CDATA[
      .font{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
      .h1{font-size:76px;font-weight:850;letter-spacing:-4px;fill:#eef6ff}
      .h2{font-size:28px;font-weight:800;fill:#eef6ff}
      .p{font-size:21px;fill:#a9b8cd}
      .s{font-size:17px;fill:#a9b8cd}
      .tag{font-size:16px;font-weight:800;fill:#07111f}
      .line{stroke-dasharray:450;stroke-dashoffset:450;animation:draw 3s ease-in-out infinite alternate}
      .spin{animation:spin 1.4s linear infinite;transform-box:fill-box;transform-origin:center}
      .pulse{animation:pulse 2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      @keyframes draw{to{stroke-dashoffset:0}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{50%{transform:scale(1.16);opacity:.68}}
    ]]></style>
  </defs>
  <rect width="1600" height="1100" fill="url(#bg)"/>
  <circle cx="220" cy="110" r="230" fill="#75e6ff" opacity=".13"/>
  <circle cx="1400" cy="210" r="250" fill="#9af28b" opacity=".10"/>
  <text x="80" y="118" class="font h1">SVG 애니메이션 종류와 실제 적용사례</text>
  <text x="84" y="170" class="font p">이미지형 · 영상형 · 인터랙티브 와이어프레임을 한 번에 설계하는 기준</text>
  <g transform="translate(80 230)">
    <rect width="1440" height="760" rx="36" fill="#101b2d" stroke="#263a56" filter="url(#shadow)"/>
    <g transform="translate(48 50)">
      <rect width="300" height="280" rx="28" fill="#14243a" stroke="#2f4665"/>
      <rect x="24" y="26" width="80" height="30" rx="15" fill="#75e6ff"/><text x="64" y="47" text-anchor="middle" class="font tag">CSS</text>
      <text x="24" y="92" class="font h2">아이콘·버튼</text>
      <text x="24" y="130" class="font s">hover, focus, loading,</text><text x="24" y="156" class="font s">선 그리기, 간단한 상태 전환</text>
      <g transform="translate(150 215)" class="spin"><circle r="38" fill="none" stroke="#304866" stroke-width="12"/><path d="M0 -38 A38 38 0 0 1 38 0" fill="none" stroke="#75e6ff" stroke-width="12" stroke-linecap="round"/></g>
    </g>
    <g transform="translate(390 50)">
      <rect width="300" height="280" rx="28" fill="#14243a" stroke="#2f4665"/>
      <rect x="24" y="26" width="94" height="30" rx="15" fill="#9af28b"/><text x="71" y="47" text-anchor="middle" class="font tag">SMIL</text>
      <text x="24" y="92" class="font h2">SVG 자체 재생</text>
      <text x="24" y="130" class="font s">animate, animateTransform,</text><text x="24" y="156" class="font s">animateMotion을 선언형으로 사용</text>
      <path id="r1" d="M55 230 C100 150 150 250 235 165" fill="none" stroke="#304866" stroke-width="8" stroke-linecap="round"/>
      <circle r="13" fill="#ffcf70"><animateMotion dur="3s" repeatCount="indefinite"><mpath href="#r1"/></animateMotion></circle>
    </g>
    <g transform="translate(732 50)">
      <rect width="300" height="280" rx="28" fill="#14243a" stroke="#2f4665"/>
      <rect x="24" y="26" width="118" height="30" rx="15" fill="#ffcf70"/><text x="83" y="47" text-anchor="middle" class="font tag">JavaScript</text>
      <text x="24" y="92" class="font h2">상호작용·데이터</text>
      <text x="24" y="130" class="font s">클릭, 스크롤, API 상태,</text><text x="24" y="156" class="font s">D3 차트 전환, GSAP 모션</text>
      <rect x="64" y="220" width="32" height="30" rx="7" fill="#75e6ff"><animate attributeName="height" values="30;82;30" dur="2.4s" repeatCount="indefinite"/><animate attributeName="y" values="220;168;220" dur="2.4s" repeatCount="indefinite"/></rect>
      <rect x="124" y="185" width="32" height="65" rx="7" fill="#9af28b"><animate attributeName="height" values="65;36;65" dur="2.4s" repeatCount="indefinite"/><animate attributeName="y" values="185;214;185" dur="2.4s" repeatCount="indefinite"/></rect>
      <rect x="184" y="152" width="32" height="98" rx="7" fill="#ff7e8a"><animate attributeName="height" values="98;54;98" dur="2.4s" repeatCount="indefinite"/><animate attributeName="y" values="152;196;152" dur="2.4s" repeatCount="indefinite"/></rect>
    </g>
    <g transform="translate(1074 50)">
      <rect width="300" height="280" rx="28" fill="#14243a" stroke="#2f4665"/>
      <rect x="24" y="26" width="90" height="30" rx="15" fill="#ff7e8a"/><text x="69" y="47" text-anchor="middle" class="font tag">Lottie</text>
      <text x="24" y="92" class="font h2">툴 기반 모션</text>
      <text x="24" y="130" class="font s">After Effects → JSON →</text><text x="24" y="156" class="font s">SVG/canvas/native renderer</text>
      <g transform="translate(150 213)" class="pulse" filter="url(#glow)"><circle r="42" fill="url(#a)"/><path d="M-20 13 Q0 30 22 12" fill="none" stroke="#ffcf70" stroke-width="10" stroke-linecap="round"/></g>
    </g>
    <g transform="translate(48 390)">
      <text class="font h2" x="0" y="0">실제 화면 적용</text>
      <g transform="translate(0 42)">
        <rect width="420" height="220" rx="24" fill="#0b1525" stroke="#263a56"/>
        <text x="28" y="48" class="font h2">랜딩/브랜딩</text>
        <path class="line" d="M34 150 C86 70 150 188 214 100 S324 92 378 154" fill="none" stroke="url(#a)" stroke-width="11" stroke-linecap="round"/>
        <text x="28" y="196" class="font s">로고 리빌 · 제품 원리 · 데이터 흐름</text>
      </g>
      <g transform="translate(462 42)">
        <rect width="420" height="220" rx="24" fill="#0b1525" stroke="#263a56"/>
        <text x="28" y="48" class="font h2">앱 상태 피드백</text>
        <rect x="88" y="110" width="244" height="58" rx="24" fill="url(#a)"/>
        <g transform="translate(210 139)" class="spin"><circle r="18" fill="none" stroke="rgba(7,17,31,.25)" stroke-width="8"/><path d="M0 -18 A18 18 0 0 1 18 0" fill="none" stroke="#07111f" stroke-width="8" stroke-linecap="round"/></g>
        <text x="28" y="196" class="font s">로딩 · 성공 체크 · 오류 흔들림</text>
      </g>
      <g transform="translate(924 42)">
        <rect width="420" height="220" rx="24" fill="#0b1525" stroke="#263a56"/>
        <text x="28" y="48" class="font h2">데이터/지도/교육</text>
        <path id="route2" d="M58 154 C110 60 180 174 248 92 S338 114 370 70" fill="none" stroke="#304866" stroke-width="8" stroke-linecap="round"/>
        <circle r="14" fill="#ffcf70"><animateMotion dur="3.2s" repeatCount="indefinite"><mpath href="#route2"/></animateMotion></circle>
        <text x="28" y="196" class="font s">차트 전환 · 지도 경로 · 단계별 다이어그램</text>
      </g>
    </g>
  </g>
  <text x="80" y="1046" class="font p">실무 팁: CSS로 단순 상태를 먼저 해결하고, 데이터/스크롤/상태 분기가 필요할 때 JavaScript, 모션 디자이너 타임라인은 Lottie를 선택하세요.</text>
</svg>
